name: Build Documentation

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "The name of the GitHub artifact containing the docker image tarball."
    secrets:
      ALGOLIA_APP_ID:
        required: true
      ALGOLIA_API_KEY:
        required: true
      ALGOLIA_INDEX_NAME:
        required: true

permissions:
  contents: read

jobs:
  build-docs:
    name: Build Docusaurus Site
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: /tmp
          
      - name: Load Docker Image
        run: |
          docker load --input /tmp/image.tar
          # Verify the image is loaded (it will be tagged as local-image:latest per the build-docker script)
          docker image ls
          
      - name: Checkout code
        # No need for submodules since docs uses NPM
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Dependendencies
        run: pnpm --filter docs install

      - name: Build Docusaurus
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: pnpm -F docs run build

      - name: Upload Documentation Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-build
          path: docs/build
