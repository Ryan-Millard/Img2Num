name: Reusable PR/Issue Commenter

on:
  workflow_call:
    inputs:
      issue_number:
        description: "PR or issue number to comment on"
        required: true
        type: number

      message:
        description: "Comment body (supports multiline markdown)"
        required: true
        type: string

      marker:
        description: "Optional marker to update an existing comment instead of creating new ones"
        required: false
        type: string
        default: ""

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Post or update PR/issue comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ inputs.issue_number }}
          MARKER: ${{ inputs.marker }}
          MESSAGE: ${{ inputs.message }}

        run: |
          set -euo pipefail

          # ------------------------------------------------------------
          # Build the final comment body
          # If a marker is provided, embed it so we can find/update later
          # ------------------------------------------------------------
          BODY="$MESSAGE"

          if [ -n "$MARKER" ]; then
            BODY="<!-- $MARKER -->"$'\n'"$MESSAGE"
          fi

          # ------------------------------------------------------------
          # If marker exists, try to find an existing comment
          # ------------------------------------------------------------
          if [ -n "$MARKER" ]; then
            COMMENT_ID=$(gh api \
              repos/${{ github.repository }}/issues/$ISSUE/comments \
              --jq ".[] | select(.body | contains(\"<!-- $MARKER -->\")) | .id" \
              | head -n 1 || true)

            # --------------------------------------------------------
            # If found, update it instead of creating a new comment
            # --------------------------------------------------------
            if [ -n "$COMMENT_ID" ]; then
              gh api -X PATCH \
                repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
                -f body="$BODY"
              exit 0
            fi
          fi

          # ------------------------------------------------------------
          # Otherwise create a new comment
          # ------------------------------------------------------------
          gh api \
            repos/${{ github.repository }}/issues/$ISSUE/comments \
            -f body="$BODY"
