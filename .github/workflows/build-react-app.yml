name: Build React App

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "The name of the GitHub artifact containing the docker image tarball."
      wasm-artifacts-path:
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-react-app:
    name: Build React Example App
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: /tmp
          
      - name: Load Docker Image
        run: |
          docker load --input /tmp/image.tar
          # Verify the image is loaded (it will be tagged as local-image:latest per the build-docker script)
          docker image ls

      - name: Checkout code
        # No need for submodules since docs uses NPM
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Dependendencies
        run: pnpm --filter react-example install

      - name: Download WASM artifacts
        if: ${{ inputs.wasm-artifacts-path }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: wasm-build
          path: ${{ inputs.wasm-artifacts-path }}

      - name: Build React app
        run: pnpm -F react-example run build

      - name: Upload React build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: react-build
          path: example-apps/react-js/dist/
