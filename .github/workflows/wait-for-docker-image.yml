# What is the point in this file if it is just an exponential backoff?
#
# The file is used to prevent race conditions between docker-ci.yml and any workflow that
# depends on the image it pushes. Without this, workflows like ci.yml may pull an outdated
# or unavailable image — most likely on a fresh PR where the image does not exist yet —
# causing failures that have nothing to do with the code being tested.

name: Wait for Docker Image

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "The name of the GitHub artifact containing the docker image tarball."

permissions:
  contents: read

jobs:
  wait-for-image:
    name: Wait for Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: /tmp
      - name: Load Docker Image
        run: |
          docker load --input /tmp/image.tar
          # Verify the image is loaded (it will be tagged as local-image:latest per the build-docker script)
          docker image ls
