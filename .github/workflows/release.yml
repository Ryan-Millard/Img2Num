name: Release (release-please, multi-language assets)

on:
  push:
    branches: [main, dev]
  pull_request:
      branches:
          [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      cpp_created:  ${{ steps.rp.outputs['core--release_created'] }}
      cpp_tag:      ${{ steps.rp.outputs['core--tag_name'] }}
      cpp_version:  ${{ steps.rp.outputs['core--version'] }}
      c_created:    ${{ steps.rp.outputs['bindings/c--release_created'] }}
      c_tag:        ${{ steps.rp.outputs['bindings/c--tag_name'] }}
      c_version:    ${{ steps.rp.outputs['bindings/c--version'] }}
      js_created:   ${{ steps.rp.outputs['packages/js--release_created'] }}
      js_tag:       ${{ steps.rp.outputs['packages/js--tag_name'] }}
      js_version:   ${{ steps.rp.outputs['packages/js--version'] }}
      py_created:   ${{ steps.rp.outputs['packages/py--release_created'] }}
      py_tag:       ${{ steps.rp.outputs['packages/py--tag_name'] }}
      py_version:   ${{ steps.rp.outputs['packages/py--version'] }}
      is_dry_run:   ${{ steps.dry_run.outputs.is_dry_run }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: rp
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: ${{ github.ref_name != 'main' }}
          skip-github-pull-request: ${{ github.ref_name != 'main' }}

      - name: Debug release-please outputs
        run: |
          echo '${{ toJSON(steps.rp.outputs) }}'

      - name: Set dry-run flag
        id: dry_run
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "is_dry_run=true" >> $GITHUB_OUTPUT
          else
            echo "is_dry_run=false" >> $GITHUB_OUTPUT
          fi

  # C/C++ native artifacts
  build-c-cpp-native:
    needs: release-please
    if: >-
      needs.release-please.outputs.cpp_created == 'true' ||
      needs.release-please.outputs.c_created == 'true' ||
      needs.release-please.outputs.is_dry_run == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        component:
          - c
          - cpp
        include:
          - os: ubuntu-latest
            plat: linux-x64
          - os: macos-latest
            plat: macos-arm64
          - os: windows-latest
            plat: windows-x64

    steps:
      - name: Set component metadata
        id: component
        shell: bash
        run: |
          if [[ "${{ matrix.component }}" == "c" ]]; then
            echo "IMG2NUM_BUILD_C_VAL=ON"                                               >> $GITHUB_OUTPUT
            echo "created=${{ needs.release-please.outputs.c_created }}"                >> $GITHUB_OUTPUT
            echo "tag=${{ needs.release-please.outputs.c_tag }}"                        >> $GITHUB_OUTPUT
            echo "version=${{ needs.release-please.outputs.c_version || '0.0.0-dev' }}" >> $GITHUB_OUTPUT
          else
            echo "IMG2NUM_BUILD_C_VAL=OFF"                                                >> $GITHUB_OUTPUT
            echo "created=${{ needs.release-please.outputs.cpp_created }}"                >> $GITHUB_OUTPUT
            echo "tag=${{ needs.release-please.outputs.cpp_tag }}"                        >> $GITHUB_OUTPUT
            echo "version=${{ needs.release-please.outputs.cpp_version || '0.0.0-dev' }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        if: ${{ steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true' }}
        with:
          ref: ${{ needs.release-please.outputs.is_dry_run == 'true' && github.sha || steps.component.outputs.tag }}
          submodules: true
          persist-credentials: false

      - name: Configure
        if: ${{ steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true' }}
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIMG2NUM_BUILD_C=${{ steps.component.outputs.IMG2NUM_BUILD_C_VAL }} \
            -DIMG2NUM_BUILD_PYTHON=OFF \
            -DIMG2NUM_BUILD_EXAMPLES=OFF \
            -DIMG2NUM_DEBUG_CACHE_VARIABLES_DUMP=ON

      - name: Build
        if: ${{ steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true' }}
        run: cmake --build build --config Release

      - name: Install
        if: ${{ steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true' }}
        shell: bash
        run: cmake --install build --config Release --prefix install

      - name: Package (Linux/macOS)
        if: ${{ (steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true') && runner.os != 'Windows' }}
        run: |
          ARCHIVE="img2num-${{ matrix.component }}-v${{ steps.component.outputs.version }}-${{ matrix.plat }}.tar.gz"
          tar -czf "$ARCHIVE" -C install .
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: ${{ (steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true') && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $archive = "img2num-${{ matrix.component }}-v${{ steps.component.outputs.version }}-${{ matrix.plat }}.zip"
          Compress-Archive -Path "${{ github.workspace }}\install\*" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Draft release when not main — real release on main. Draft is not public and can be deleted.
      - uses: softprops/action-gh-release@403a5240f3837fa857f642062e05aad6bb3391ca
        if: ${{ steps.component.outputs.created == 'true' || needs.release-please.outputs.is_dry_run == 'true' }}
        with:
          tag_name: ${{ needs.release-please.outputs.is_dry_run == 'true' && format('{0}@{1}-{2}', github.ref_name, github.sha, matrix.component) || steps.component.outputs.tag }}
          files: ${{ env.ARCHIVE }}
          draft: ${{ needs.release-please.outputs.is_dry_run == 'true' }}

  # WASM + JS
  build-js:
    if: >-
     needs.release-please.outputs.js_created == 'true' ||
     needs.release-please.outputs.is_dry_run == 'true'
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          ref: ${{ needs.release-please.outputs.is_dry_run == 'true' && github.sha || needs.release-please.outputs.js_tag }}
          submodules: true

      - uses: mymindstorm/setup-emsdk@1f4f5866c1f8745a10fcb64c4d7a0eb7a8daed9d

      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.4.0

      - name: Install dependencies
        run: pnpm install

      - name: Build WASM
        run: |
          emcmake cmake -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DIMG2NUM_BUILD_C=ON \
            -DIMG2NUM_BUILD_PYTHON=OFF \
            -DIMG2NUM_BUILD_EXAMPLES=OFF \
            -DIMG2NUM_DEBUG_CACHE_VARIABLES_DUMP=ON \
            .
          cmake --build build-wasm

      - name: Build JS
        run: pnpm build
        working-directory: packages/js

      - name: Package
        run: |
          release_version=${{ needs.release-please.outputs.js_version }}
          tar -czf           /tmp/img2num-js-v${release_version}.tar.gz packages/js/dist
          tar -czf /tmp/img2num-js-wasm-only-v${release_version}.tar.gz packages/js/build-wasm

      # Draft release when not main — same as C/C++ above
      - uses: softprops/action-gh-release@403a5240f3837fa857f642062e05aad6bb3391ca
        with:
          tag_name: ${{ needs.release-please.outputs.is_dry_run == 'true' && format('{0}@{1}-js', github.ref_name, github.sha) || needs.release-please.outputs.js_tag }}
          files: |
            /tmp/img2num-js-v${{ needs.release-please.outputs.js_version }}.tar.gz
            /tmp/img2num-js-wasm-only-v${{ needs.release-please.outputs.js_version }}.tar.gz
          draft: ${{ needs.release-please.outputs.is_dry_run == 'true' }}

      # --dry-run exercises the full publish pipeline (auth, package validation,
      # tarball construction) without actually pushing to the registry.
      - name: Publish to npm
        run: |
          DRY_RUN_FLAG=${{ needs.release-please.outputs.is_dry_run == 'true' && '--dry-run' || '' }}
          pnpm publish \
            --access public \
            --provenance \
            --no-git-checks \
            $DRY_RUN_FLAG
        working-directory: packages/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Wheels + PyPI (Python)
  build-py:
    if: >-
      needs.release-please.outputs.py_created == 'true' ||
      needs.release-please.outputs.is_dry_run == 'true'
    needs: release-please
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          ref: ${{ needs.release-please.outputs.is_dry_run == 'true' && github.sha || needs.release-please.outputs.py_tag }}
          submodules: true

      - name: Sync released version into root pyproject.toml
          shell: bash
          run: |
            VERSION="${{ needs.release-please.outputs.py_version }}"
            VERSION="${VERSION:-0.0.0}"   # dry-run on non-main has no version
            python << 'EOF'
            import os, re, pathlib
            v = os.environ["VERSION"]
            p = pathlib.Path("pyproject.toml")
            s = p.read_text()
            s = re.sub(r'^version = ".*"(\s*#\s*x-release-please-version)',
                       f'version = "{v}"\\1', s, flags=re.M)
            p.write_text(s)
            EOF
          env:
            VERSION: ${{ needs.release-please.outputs.py_version }}

      - uses: pypa/cibuildwheel@a78478edc4b83cce46f23e49e649d3e4b6437df3
        with:
          package-dir: .
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-py-sdist:
    if: >-
      needs.release-please.outputs.py_created == 'true' ||
      needs.release-please.outputs.is_dry_run == 'true'
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          ref: ${{ needs.release-please.outputs.is_dry_run == 'true' && github.sha || needs.release-please.outputs.py_tag }}
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync released version into root pyproject.toml
          shell: bash
          run: |
            VERSION="${{ needs.release-please.outputs.py_version }}"
            VERSION="${VERSION:-0.0.0}"   # dry-run on non-main has no version
            python << 'EOF'
            import os, re, pathlib
            v = os.environ["VERSION"]
            p = pathlib.Path("pyproject.toml")
            s = p.read_text()
            s = re.sub(r'^version = ".*"(\s*#\s*x-release-please-version)',
                       f'version = "{v}"\\1', s, flags=re.M)
            p.write_text(s)
            EOF
          env:
            VERSION: ${{ needs.release-please.outputs.py_version }}

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: wheelhouse/*.tar.gz

  publish-py:
    if: ${{ needs.release-please.outputs.py_created == 'true' }}
    needs: [release-please, build-py, build-py-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: wheelhouse

      # Draft release when not main — same as other jobs
      - uses: softprops/action-gh-release@403a5240f3837fa857f642062e05aad6bb3391ca
        with:
          tag_name: ${{ needs.release-please.outputs.is_dry_run == 'true' && format('{0}@{1}-py', github.ref_name, github.sha) || needs.release-please.outputs.py_tag }}
          files: wheelhouse/*
          draft: ${{ needs.release-please.outputs.is_dry_run == 'true' }}

      # On branches other than main: publish to TestPyPI instead of prod. This fully exercises the
      # upload path (auth, metadata validation, wheel inspection) against a
      # real registry. You'll need a TEST_PYPI_API_TOKEN secret and a TestPyPI
      # project configured for trusted publishing or token auth.
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        if: ${{ needs.release-please.outputs.is_dry_run != 'true' }}
        with:
          packages-dir: wheelhouse/

      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        if: ${{ needs.release-please.outputs.is_dry_run == 'true' }}
        with:
          packages-dir: wheelhouse/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true   # version may already exist on TestPyPI from previous runs

  propagate-cpp:
    needs: release-please
    if: ${{ needs.release-please.outputs.cpp_created == 'true' && needs.release-please.outputs.is_dry_run != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - path: bindings/c
            scope: bindings/c
          - path: packages/py
            scope: py
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          token: ${{ secrets.RELEASE_PROPAGATION_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create propagation PR → ${{ matrix.target.path }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PROPAGATION_TOKEN }}
          VERSION:  ${{ needs.release-please.outputs.cpp_version }}
          TARGET_PATH: ${{ matrix.target.path }}
          SCOPE:    ${{ matrix.target.scope }}
        run: |
          SLUG="$(echo "$TARGET_PATH" | tr '/' '-')"
          BRANCH="release-propagation/core-v${VERSION}-to-${SLUG}"

          git checkout -b "$BRANCH"

          git commit --allow-empty \
            -m "fix(${SCOPE}): propagate core v${VERSION} release"

          git push origin "$BRANCH"

          gh pr create \
            --title "fix(${SCOPE}): propagate core v${VERSION} release" \
            --body "Automated patch bump for \`${TARGET_PATH}\` following the **\`core/\` (C++) v${VERSION}** release.\n\n> Merging this PR will allow release-please to open a patch release PR for \`${TARGET_PATH}\`.\n\n**Dependency:** \`core\` -> \`${TARGET_PATH}\`" \
            --base main \
            --head "$BRANCH"

  propagate-c:
    needs: release-please
    if: ${{ needs.release-please.outputs.c_created == 'true' && needs.release-please.outputs.is_dry_run != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          token: ${{ secrets.RELEASE_PROPAGATION_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create propagation PR → packages/js
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PROPAGATION_TOKEN }}
          VERSION:  ${{ needs.release-please.outputs.c_version }}
        run: |
          BRANCH="release-propagation/c-v${VERSION}-to-packages-js"

          git checkout -b "$BRANCH"
          git commit --allow-empty \
            -m "fix(packages/js): propagate bindings/c v${VERSION} release"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix(packages/js): propagate bindings/c v${VERSION} release" \
            --body "Automated patch bump for \`packages/js\` following the **bindings/c v${VERSION}** release.\n\n > Merging this PR will allow release-please to open a patch release PR for \`packages/js\`.\n\n**Dependency:** \`bindings/c\` → \`packages/js\`" \
            --base main \
            --head "$BRANCH"
