name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened] # Removed 'closed' as that's handled by cleanup/deploy logic

  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  pull-requests: write

env:
  IMAGE_NAME: ryanmillard/img2num-dev

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      clean_core_tag: ${{ steps.meta.outputs.clean_core_tag }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: meta
        run: |
          IMAGE="${{ env.IMAGE_NAME }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="main"
          fi
          echo "clean_core_tag=$TAG" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build and Export to Tar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          tags: local-image:latest
          outputs: type=docker,dest=/tmp/image.tar
          # Local cache to speed up subsequent runs without needing registry access
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-artifact
          path: /tmp/image.tar

  # --- CALL DOWNSTREAM TEST ---
  test:
    needs: build
    uses: ./.github/workflows/ci.yml
    with:
      artifact-name: docker-artifact

  # --- PUSH TO DOCKERHUB (Only on Main/Tags) ---
  deploy:
    needs: [build, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-artifact
          path: /tmp

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and Push
        run: |
          docker load --input /tmp/image.tar
          # Tag and push all computed tags
          IFS=',' read -ra ADDR <<< "${{ needs.build.outputs.tags }}"
          for tag in "${ADDR[@]}"; do
            docker tag local-image:latest "$tag"
            docker push "$tag"
          done
          # Also push 'latest' if it's a main/tag push
          docker tag local-image:latest ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

  notify:
    needs: [build, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Create Docker comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🐳 Docker image built and tested!
            The image was verified in the downstream pipeline.
            **Tag:** `${{ needs.build.outputs.clean_core_tag }}`