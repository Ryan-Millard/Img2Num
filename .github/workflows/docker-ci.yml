name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write        # needed for GHCR
  pull-requests: write   # needed for PR comments

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/img2num-dev
  DH_IMAGE: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    outputs:
      clean_core_tag: ${{ steps.meta.outputs.clean_core_tag }}
      tags: ${{ steps.meta.outputs.tags }}
      cache_ref: ${{ steps.meta.outputs.cache_ref }}
      is_fork: ${{ steps.meta.outputs.is_fork }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        if: github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IS_FORK="${{ github.event.pull_request.head.repo.fork }}"
          GHCR="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/img2num-dev"
          DH="${{ env.DH_IMAGE }}"
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "pull_request" ]]; then
            PR="${{ github.event.pull_request.number }}"

            CLEAN_CORE_TAG="pr-${PR}"
            ARTIFACT_NAME="docker-image-pr-${PR}"

            if [[ "$IS_FORK" == "true" ]]; then
              # Forks: tag the image locally only (no registry push)
              TAGS="img2num-dev:pr-${PR}"
              CACHE_REF=""
            else
              TAGS="${GHCR}:pr-${PR}"
              CACHE_REF="${GHCR}:cache-pr-${PR}"
            fi

          elif [[ "$EVENT" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"

            CLEAN_CORE_TAG="$VERSION"
            TAGS="${GHCR}:${VERSION},${GHCR}:latest,${DH}:${VERSION},${DH}:latest"
            CACHE_REF="${GHCR}:buildcache"
            ARTIFACT_NAME=""

          else
            CLEAN_CORE_TAG="main"
            TAGS="${GHCR}:main,${GHCR}:latest,${DH}:main,${DH}:latest"
            CACHE_REF="${GHCR}:buildcache"
            ARTIFACT_NAME=""
          fi

          echo "clean_core_tag=$CLEAN_CORE_TAG"   >> $GITHUB_OUTPUT
          echo "tags=$TAGS"                         >> $GITHUB_OUTPUT
          echo "cache_ref=$CACHE_REF"               >> $GITHUB_OUTPUT
          echo "is_fork=true"                   >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME"       >> $GITHUB_OUTPUT

      - name: Build & Push Docker image (non-fork)
        if: github.event.pull_request.head.repo.fork == false
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.cache_ref }}
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max

      - name: Build Docker image (fork — local load only)
        if: github.event.pull_request.head.repo.fork == true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile.dev
          # Forks cannot push to GHCR, so we load into the local Docker daemon
          # and export via `docker save` below.
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          # No registry cache available for forks; fall back to the default
          # Buildx inline/local cache so layer reuse still works across re-runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export fork image to tar
        if: github.event.pull_request.head.repo.fork == true
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.tags }}"
          OUTPUT_FILE="docker-image.tar"
          echo "Saving ${IMAGE_TAG} → ${OUTPUT_FILE}"
          docker save "${IMAGE_TAG}" | gzip > "${OUTPUT_FILE}.gz"
          echo "Compressed size: $(du -sh ${OUTPUT_FILE}.gz | cut -f1)"

      - name: Upload fork image artifact
        if: github.event.pull_request.head.repo.fork == true
        uses: actions/upload-artifact@v4
        with:
          # Include the PR number in the artifact name so reviewers can
          # distinguish artifacts when multiple fork PRs are open at once.
          name: ${{ steps.meta.outputs.artifact_name }}
          path: docker-image.tar.gz
          # Retain for the lifetime of the PR review window; adjust as needed.
          retention-days: 14


  notify:
    needs: build
    if: github.event_name == 'pull_request' && needs.build.result == 'success'

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    env:
      CLEAN_CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}
      IS_FORK: ${{ needs.build.outputs.is_fork }}
      ARTIFACT_NAME: ${{ needs.build.outputs.artifact_name }}

    steps:
      # Avoid chat spamming by checking for an existing comment
      - name: Find Docker comment
        id: fc
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- docker-image-comment:pr -->"

      - name: Debug comment detection
        if: steps.fc.outputs.comment-id != ''
        run: |
          echo "Found comment ID: ${{ steps.fc.outputs.comment-id }}"

      - name: Compute lowercase image ref
        id: img
        run: |
          # GHCR for some reason requires lowercase when pulling
          LOWER_OWNER_NAME="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${LOWER_OWNER_NAME}/img2num-dev"
          echo "lower_owner_name=${LOWER_OWNER_NAME}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT

      # ── Non-fork PR comment ───────────────────────────────────────────────
      - name: Create Docker comment (non-fork)
        if: steps.fc.outputs.comment-id == '' && env.IS_FORK == 'false'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- docker-image-comment:pr -->
            ## 🐳 Docker image built successfully!

            ### Image
            [`${{ steps.img.outputs.ghcr_image }}:${{ env.CLEAN_CORE_TAG }}`](https://github.com/${{ steps.img.outputs.lower_owner_name }}/${{ github.event.repository.name }}/pkgs/container/img2num-dev/${{ env.CLEAN_CORE_TAG }})

            ### Run it locally:
            ```bash
            IMG2NUM_IMAGE=${{ steps.img.outputs.ghcr_image }}:${{ env.CLEAN_CORE_TAG }} ./img2num sh
            ```

      # ── Fork PR comment ───────────────────────────────────────────────────
      # Forks cannot push to GHCR, so we guide reviewers to download the
      # artifact and load it into their local Docker daemon manually.
      - name: Create Docker comment (fork)
        if: steps.fc.outputs.comment-id == '' && env.IS_FORK == 'true'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- docker-image-comment:pr -->
            ## 🐳 Docker image built successfully! (fork PR)

            > [!NOTE]
            > This PR comes from a fork, so the image cannot be pushed to GHCR.
            > A compressed image tarball has been uploaded as a GitHub Actions artifact instead.

            ### 1 — Download the artifact

            Go to the **[workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**
            and download **`${{ env.ARTIFACT_NAME }}`** from the *Artifacts* section, or use the GitHub CLI:

            ```bash
            gh run download ${{ github.run_id }} \
              --repo ${{ github.repository }} \
              --name "${{ env.ARTIFACT_NAME }}"
            ```

            ### 2 — Load the image

            ```bash
            docker load < docker-image.tar.gz
            ```

            ### 3 — Run it

            ```bash
            IMG2NUM_IMAGE=img2num-dev:${{ env.CLEAN_CORE_TAG }} ./img2num sh
            ```

            > [!TIP]
            > The artifact is retained for **14 days**. Re-run the workflow if it has expired.


  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete PR images from GHCR
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55
        with:
          package-name: img2num-dev
          package-type: container
          delete-untagged-versions: false
          dry-run: true
          # Deletes both pr-N and cache-pr-N tags
          # $ anchors each alternative so pr-5 does not match pr-50, pr-51, etc.
          #   (See CodeRabbit's related review comment: https://github.com/Ryan-Millard/Img2Num/pull/312#discussion_r3105632912)
          min-versions-to-keep: 0
          ignore-versions: "^(?!pr-${{ github.event.pull_request.number }}$|cache-pr-${{ github.event.pull_request.number }}$).*"
