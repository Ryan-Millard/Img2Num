name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - Dockerfile.dev
      - .devcontainer/**
      - .dockerignore

  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  IMAGE_NAME: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    outputs:
      clean_core_tag: ${{ steps.meta.outputs.clean_core_tag }}
      tags: ${{ steps.meta.outputs.tags }}
      cache_ref: ${{ steps.meta.outputs.cache_ref }}
      docker_changed: ${{ steps.filter.outputs.docker }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            docker:
              - Dockerfile.dev
              - .devcontainer/**
              - .dockerignore

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.filter.outputs.docker == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        if: steps.filter.outputs.docker == 'true'
        id: meta
        run: |
          IMAGE="${{ env.IMAGE_NAME }}"
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "pull_request" ]]; then
            PR="${{ github.event.pull_request.number }}"

            CLEAN_CORE_TAG="pr-${PR}"
            TAGS="${IMAGE}:pr-${PR}"
            CACHE_REF="${IMAGE}:cache-pr-${PR}"

          elif [[ "$EVENT" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"

            CLEAN_CORE_TAG="$VERSION"
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
            CACHE_REF="${IMAGE}:buildcache"

          else
            CLEAN_CORE_TAG="main"
            TAGS="${IMAGE}:main,${IMAGE}:latest"
            CACHE_REF="${IMAGE}:buildcache"
          fi

          echo "clean_core_tag=$CLEAN_CORE_TAG" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "cache_ref=$CACHE_REF" >> $GITHUB_OUTPUT

      - name: Build & Push Docker image
        if: github.event.action != 'closed' && (steps.filter.outputs.docker == 'true' || github.event_name != 'pull_request')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max


  notify:
    needs: build
    if: github.event_name == 'pull_request' && needs.build.outputs.docker_changed == 'true'

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    env:
      IMAGE_NAME: ryanmillard/img2num-dev
      CLEAN_CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}
      CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}

    steps:
      # Avoid chat spamming by checking for an existing comment
      - name: Find Docker comment
        id: fc
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- docker-image-comment:pr -->"
        
      - name: Create Docker comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-comment@v1
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- docker-image-comment:pr -->
            ## 🐳 Docker image built successfully!
  
            ### Image
            [`${CORE_TAG}`](https://hub.docker.com/r/ryanmillard/img2num-dev/tags?name=pr-${{ github.event.pull_request.number }})
  
            ### Run it locally:
            ```bash
            IMG2NUM_IMAGE=${CORE_TAG} ./img2num sh
            ```


  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR images
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          IMAGE="${{ env.IMAGE_NAME }}"
          
          TAGS=(
            "pr-${PR_NUMBER}"
            "cache-pr-${PR_NUMBER}"
          )
          
          for TAG in "${TAGS[@]}"; do
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/" \
            || echo "Tag $TAG not found or already deleted"
          done
