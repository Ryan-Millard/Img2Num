name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - Dockerfile.dev
      - .devcontainer
      - .dockerignore

  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide what we are building
      - name: Compute tags
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TAGS=${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}_commit-sha-${{ github.sha }}" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "TAGS=${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME},${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

          else
            echo "TAGS=${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          fi

      # Build + Push with caching
      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.TAGS }}

          # 🔥 critical for your setup
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Cleanup old PR images
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR images
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Fetch all tags matching pr-NUMBER_*
          # This is because new tags are created for each commit
          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/?page_size=100" \
            | jq -r ".results[].name | select(startswith(\"pr-${PR_NUMBER}_\"))")

          for TAG in $TAGS; do
            curl -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${TAG}/"
          done
