name: Docker CI

on:
  workflow_dispatch:
  pull_request:
  pull_request_target:
    types: [opened, synchronize, reopened, closed]

  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  IMAGE_NAME: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    outputs:
      clean_core_tag: ${{ steps.meta.outputs.clean_core_tag }}
      tags: ${{ steps.meta.outputs.tags }}
      cache_ref: ${{ steps.meta.outputs.cache_ref }}

    steps:
      - name: Get User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check User Permission
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo."
          echo "Current permission level is ${{ steps.checkAccess.outputs.user-permission }}"
          echo "Job originally triggered by ${{ github.actor }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IMAGE="${{ env.IMAGE_NAME }}"
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "pull_request*" ]]; then
            PR="${{ github.event.pull_request.number }}"

            CLEAN_CORE_TAG="pr-${PR}"
            TAGS="${IMAGE}:pr-${PR}"
            CACHE_REF="${IMAGE}:cache-pr-${PR}"

          elif [[ "$EVENT" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"

            CLEAN_CORE_TAG="$VERSION"
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
            CACHE_REF="${IMAGE}:buildcache"

          else
            CLEAN_CORE_TAG="main"
            TAGS="${IMAGE}:main,${IMAGE}:latest"
            CACHE_REF="${IMAGE}:buildcache"
          fi

          echo "clean_core_tag=$CLEAN_CORE_TAG" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "cache_ref=$CACHE_REF" >> $GITHUB_OUTPUT

      - name: Build & Push Docker image
        # if: (github.event_name == 'pull_request_target' && github.event.action != 'closed') || github.event_name != 'pull_request'
        if: (startsWith(github.event_name, 'pull_request') && github.event.action != 'closed') || !startsWith(github.event_name, 'pull_request')
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.cache_ref }}
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max


  notify:
    needs: build
    # if: github.event_name == 'pull_request_target' && needs.build.result == 'success'
    if: startsWith(github.event_name, 'pull_request') && needs.build.result == 'success'

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    env:
      IMAGE_NAME: ryanmillard/img2num-dev
      CLEAN_CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}
      CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}

    steps:
      # Avoid chat spamming by checking for an existing comment
      - name: Find Docker comment
        id: fc
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- docker-image-comment:pr -->"

      - name: Debug comment detection
        if: steps.fc.outputs.comment-id != ''
        run: |
          echo "Found comment ID: ${{ steps.fc.outputs.comment-id }}"
      
      - name: Create Docker comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- docker-image-comment:pr -->
            ## 🐳 Docker image built successfully!
          
            ### Image
            [`${{ env.IMAGE_NAME }}:${{ env.CORE_TAG }}`](https://hub.docker.com/r/${{ env.IMAGE_NAME }}/tags?name=${{ env.CORE_TAG }})
          
            ### Run it locally:
            ```bash
            IMG2NUM_IMAGE=${{ env.IMAGE_NAME }}:${{ env.CORE_TAG }} ./img2num sh


  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR images
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          IMAGE="${{ env.IMAGE_NAME }}"
          
          TAGS=(
            "pr-${PR_NUMBER}"
            "cache-pr-${PR_NUMBER}"
          )
          
          for TAG in "${TAGS[@]}"; do
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/" \
            || echo "Tag $TAG not found or already deleted"
          done
