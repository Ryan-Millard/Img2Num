name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - Dockerfile.dev
      - .devcontainer
      - .dockerignore

  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      clean_core_tag: ${{ steps.meta.outputs.CLEAN_CORE_TAG }}
      core_tag: ${{ steps.meta.outputs.CORE_TAG }}
      tags: ${{ steps.meta.outputs.TAGS }}
      cache_ref: ${{ steps.meta.outputs.CACHE_REF }}
      docker_changed: ${{ steps.filter.outputs.docker }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            docker:
              - Dockerfile.dev
              - .devcontainer/**
              - .dockerignore

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.filter.outputs.docker == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide what we are building
      - name: Compute tags
        if: steps.filter.outputs.docker == 'true'
        id: meta
        run: |
          # Default: main branch
          CLEAN_CORE_TAG="latest"
          CORE_TAG="${{ env.IMAGE_NAME }}:$CLEAN_CORE_TAG"
          TAGS="$CORE_TAG"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CLEAN_CORE_TAG="pr-${{ github.event.pull_request.number }}_commit-sha-${{ github.sha }}"
            CORE_TAG="${{ env.IMAGE_NAME }}:$CLEAN_CORE_TAG"
            TAGS="$CORE_TAG"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            CLEAN_CORE_TAG="${GITHUB_REF_NAME}"
            CORE_TAG="${{ env.IMAGE_NAME }}:$CLEAN_CORE_TAG"
            TAGS="${{ env.IMAGE_NAME }}:$CLEAN_CORE_TAG,$CORE_TAG"
          fi

          # PRs get per-PR caching.
          # Main and tag pushes are assumed final so they share 'buildcache'
          CACHE_REF="${{ env.IMAGE_NAME }}:buildcache"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CACHE_REF="${{ env.IMAGE_NAME }}:cache-pr-${{ github.event.pull_request.number }}"
          fi

          echo "CLEAN_CORE_TAG=$CLEAN_CORE_TAG" >> "$GITHUB_OUTPUT"
          echo "CORE_TAG=$CORE_TAG" >> "$GITHUB_OUTPUT"
          echo "TAGS=$TAGS" >> "$GITHUB_OUTPUT"
          echo "CACHE_REF=$CACHE_REF" >> "$GITHUB_OUTPUT"

      - name: Build & Push Docker image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.TAGS }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.CACHE_REF }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.CACHE_REF }},mode=max

  notify:
    needs: build
    if: github.event_name == 'pull_request' && needs.build.outputs.docker_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEAN_CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}
        run: |
          CORE_TAG="${{ env.IMAGE_NAME }}:${CLEAN_CORE_TAG}"
          CACHE_REF="${{ env.IMAGE_NAME }}:buildcache"
          if [[ "$CLEAN_CORE_TAG" == pr-* ]]; then
            PR_NUMBER=$(echo "$CLEAN_CORE_TAG" | cut -d_ -f1 | sed 's/pr-//')
            CACHE_REF="${{ env.IMAGE_NAME }}:cache-pr-${PR_NUMBER}"
          fi

          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments -f body="$(cat <<EOF
          ## 🐳 Docker image built successfully!

          ### Image
          [\`${CORE_TAG}\`](https://hub.docker.com/r/ryanmillard/img2num-dev/tags?name=${CLEAN_CORE_TAG})

          ### Cache
          [\`${CACHE_REF}\`](https://hub.docker.com/r/ryanmillard/img2num-dev/tags?name=${CACHE_REF})

          ### Run it locally:
          \`\`\`bash
          IMG2NUM_IMAGE=${CORE_TAG} ./img2num sh
          \`\`\`
          > You can always verify the image you are running by checking the `IMG2NUM_IMAGE` environment variable.
          EOF
          )"

  # Cleanup old PR images and cache when a PR is closed
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR images and caches
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Fetch and delete all image tags matching pr-NUMBER_*
          # This is because new tags are created for each commit
          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/?page_size=100" \
            | jq -r ".results[].name | select(startswith(\"pr-${PR_NUMBER}_\"))")

          for TAG in $TAGS; do
            curl -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${TAG}/"
          done

          # Delete the per-PR cache tag
          curl -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/cache-pr-${PR_NUMBER}/"
