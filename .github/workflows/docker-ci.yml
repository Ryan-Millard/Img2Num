name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - Dockerfile.dev
      - .devcontainer
      - .dockerignore

  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.TAGS }}
      cache_ref: ${{ steps.meta.outputs.CACHE_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide what we are building
      - name: Compute tags
        id: meta
        run: |
          # Default: main branch
          TAGS="${{ env.IMAGE_NAME }}:latest"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAGS="${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}_commit-sha-${{ github.sha }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME},${{ env.IMAGE_NAME }}:latest"
          fi

          # PRs get per-PR caching.
          # Main and tag pushes are assumed final so they share 'buildcache'
          CACHE_REF="${{ env.IMAGE_NAME }}:buildcache"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CACHE_REF="${{ env.IMAGE_NAME }}:cache-pr-${{ github.event.pull_request.number }}"
          fi

          echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT
          echo "CACHE_REF=${CACHE_REF}" >> $GITHUB_OUTPUT

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.TAGS }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.CACHE_REF }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.CACHE_REF }},mode=max

  notify:
    needs: build
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    uses: ./.github/workflows/commenter.yml
    with:
      issue_number: ${{ github.event.pull_request.number }}
      marker: docker-image-comment
      message: |
        🐳 **Docker image built successfully!**

        |                |                                                                                                                               |
        |----------------|-------------------------------------------------------------------------------------------------------------------------------|
        | **Image**      | `${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}_commit-sha-${{ github.sha }}`                               |
        | **Cache**      | `${{ env.IMAGE_NAME }}:cache-pr-${{ github.event.pull_request.number }}`                                                      |
        | **Docker Hub** | https://hub.docker.com/r/ryanmillard/img2num-dev/tags/pr-${{ github.event.pull_request.number }}_commit-sha-${{ github.sha }} |

        **Run it locally:**
        ```bash
        IMG2NUM_IMAGE=${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}_commit-sha-${{ github.sha }} ./img2num sh
        ```

  # Cleanup old PR images and cache when a PR is closed
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR images and caches
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # Fetch and delete all image tags matching pr-NUMBER_*
          # This is because new tags are created for each commit
          TAGS=$(curl -s \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/?page_size=100" \
            | jq -r ".results[].name | select(startswith(\"pr-${PR_NUMBER}_\"))")

          for TAG in $TAGS; do
            curl -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${TAG}/"
          done

          # Delete the per-PR cache tag
          curl -X DELETE \
            -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/cache-pr-${PR_NUMBER}/"
