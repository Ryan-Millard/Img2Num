name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write        # needed for GHCR
  pull-requests: write   # needed for PR comments

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/img2num-dev
  DH_IMAGE: ryanmillard/img2num-dev

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    outputs:
      clean_core_tag: ${{ steps.meta.outputs.clean_core_tag }}
      tags: ${{ steps.meta.outputs.tags }}
      cache_ref: ${{ steps.meta.outputs.cache_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          GHCR="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/img2num-dev"
          DH="${{ env.DH_IMAGE }}"
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "pull_request" ]]; then
            PR="${{ github.event.pull_request.number }}"

            CLEAN_CORE_TAG="pr-${PR}"
            TAGS="${GHCR}:pr-${PR}"
            CACHE_REF="${GHCR}:cache-pr-${PR}"

          elif [[ "$EVENT" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"

            CLEAN_CORE_TAG="$VERSION"
            TAGS="${GHCR}:${VERSION},${GHCR}:latest,${DH}:${VERSION},${DH}:latest"
            CACHE_REF="${GHCR}:buildcache"

          else
            CLEAN_CORE_TAG="main"
            TAGS="${GHCR}:main,${GHCR}:latest,${DH}:main,${DH}:latest"
            CACHE_REF="${GHCR}:buildcache"
          fi

          echo "clean_core_tag=$CLEAN_CORE_TAG" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "cache_ref=$CACHE_REF" >> $GITHUB_OUTPUT

      - name: Build & Push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.cache_ref }}
            type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max


  notify:
    needs: build
    if: github.event_name == 'pull_request' && needs.build.result == 'success'

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    env:
      CLEAN_CORE_TAG: ${{ needs.build.outputs.clean_core_tag }}

    steps:
      # Avoid chat spamming by checking for an existing comment
      - name: Find Docker comment
        id: fc
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- docker-image-comment:pr -->"

      - name: Debug comment detection
        if: steps.fc.outputs.comment-id != ''
        run: |
          echo "Found comment ID: ${{ steps.fc.outputs.comment-id }}"

      - name: Compute lowercase image ref
        id: img
        run: |
          # GHCR for some reason requires lowercase when pulling
          LOWER_OWNER_NAME="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${LOWER_OWNER_NAME}/img2num-dev"
          echo "lower_owner_name=${LOWER_OWNER_NAME}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT

      - name: Create Docker comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- docker-image-comment:pr -->
            ## 🐳 Docker image built successfully!

            ### Image
            [`${{ steps.img.outputs.ghcr_image }}:${{ env.CLEAN_CORE_TAG }}`](https://github.com/${{ steps.img.outputs.lower_owner_name }}/${{ github.event.repository.name }}/pkgs/container/img2num-dev/${{ env.CLEAN_CORE_TAG }})

            ### Run it locally:
            ```bash
            IMG2NUM_IMAGE=${{ steps.img.outputs.ghcr_image }}:${{ env.CLEAN_CORE_TAG }} ./img2num sh
            ```


  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete PR images from GHCR
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55
        with:
          package-name: img2num-dev
          package-type: container
          delete-untagged-versions: false
          dry-run: true
          # Deletes both pr-N and cache-pr-N tags
          # $ anchors each alternative so pr-5 does not match pr-50, pr-51, etc.
          #   (See CodeRabbit's related review comment: https://github.com/Ryan-Millard/Img2Num/pull/312#discussion_r3105632912)
          min-versions-to-keep: 0
          ignore-versions: "^(?!pr-${{ github.event.pull_request.number }}$|cache-pr-${{ github.event.pull_request.number }}$).*"
