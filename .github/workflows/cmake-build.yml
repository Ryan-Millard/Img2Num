name: Build C & C++

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-wasm:
    name: Build WASM (bindings/js)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Run emcmake
        run: emcmake cmake -DCMAKE_BUILD_TYPE=Release -B build-wasm/ .

      - name: Build using Emscripten
        run: cmake --build build-wasm/

      - name: Upload WASM build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-build
          path: packages/js/build-wasm/

  build-c-cpp:
    name: Build C & C++
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Check toolchain
        run: |
          cmake --version
          clang --version

      - name: Run cmake
        run: cmake -B build-c-cpp/ .

      - name: Build C/C++
        run: cmake --build build-c-cpp/

      - name: Upload C/C++ build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-c-cpp
          path: build-c-cpp/
