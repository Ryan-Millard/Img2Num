name: Build C & C++

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-wasm:
    name: Build WASM (bindings/js)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true

      - name: Run emcmake
        run: emcmake cmake -DCMAKE_BUILD_TYPE=Release -B build-wasm/ .

      - name: Build using Emscripten
        run: cmake --build build-wasm/

      - name: Upload WASM build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wasm-build
          path: packages/js/build-wasm/

  build-c-cpp:
    name: Build C & C++
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true

      - name: Check toolchain
        run: |
          cmake --version
          clang --version

      - name: Run cmake
        run: cmake -B build-c-cpp/ .

      - name: Build C/C++
        run: cmake --build build-c-cpp/

      - name: Upload C/C++ build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-c-cpp
          path: build-c-cpp/

  build-py:
    name: Build Python
    runs-on: ubuntu-latest
    # container:
    #   image: ghcr.io/ryan-millard/img2num-dev:pr-375
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true
      
      - name: Checkout docker with docker-compose
        run: IMG2NUM_IMAGE=ghcr.io/ryan-millard/img2num-dev:pr-375 docker compose up -d dev
      
      - name: Check running containers
        run: docker ps -a

      # - name: Enter container
      #   run: docker compose exec dev bash

      - name: Echo
        run: echo "$IMG2NUM_IMAGE"

      - name: Check toolchain
        run: |
          docker compose exec -T dev cmake --version
          docker compose exec -T dev clang --version

      - name: Run uv sync
        run: docker compose exec -T dev uv sync

      - name: Build Img2Num Python Package
        run: docker compose exec -T dev uv run python3 -c "import img2num;"

      - name: Build and run example-apps/console-py
        # Uses an image that is guaranteed to exist
        run: docker compose exec -T dev uv run --package console-py dev docs/static/img/favicon.png

      - name: Upload Python build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: py-build
          path: packages/py/build-py/

      - name: Upload example-apps/console-py output artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: console-py-output
          path: console-py_outputs/
