name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read
  packages: read

jobs:
  set-image:
    name: Set Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set.outputs.image }}
    steps:
      - name: Set image
        id: set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_IMAGE="ghcr.io/ryan-millard/img2num-dev"

          MAIN_IMAGE="${BASE_IMAGE}:main"
          DEV_IMAGE="${BASE_IMAGE}:dev"

          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Try PR image first (highest priority)
          if [[ -n "$PR_NUMBER" ]]; then
            PR_TAG="pr-${PR_NUMBER}"
            GHCR_IMAGE="ghcr.io/ryan-millard/img2num-dev:${PR_TAG}"
            DH_IMAGE="ryan-millard/img2num-dev:${PR_TAG}"

            GHCR_IMAGE_EXISTS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              /users/ryan-millard/packages/container/img2num-dev/versions \
              --jq "any(.metadata.container.tags[]? == \"${PR_TAG}\")")

            DH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 2 --max-time 5 \
              "https://registry.hub.docker.com/v2/repositories/ryan-millard/img2num-dev/tags/${PR_TAG}/")
          else
            GHCR_IMAGE_EXISTS="false"
            DH_STATUS="404"
          fi

          if [[ "$GHCR_IMAGE_EXISTS" == "true" ]]; then
            echo "image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
            echo "image=${GHCR_IMAGE}"
          elif [[ "$DH_STATUS" == "200" ]]; then
            echo "image=${DH_IMAGE}" >> $GITHUB_OUTPUT
            echo "image=${DH_IMAGE}"
          else
            # Fallback: main/dev (never PR ref names)
            BRANCH="${{ github.ref_name }}"

            case "$BRANCH" in
              main)
                IMAGE="$MAIN_IMAGE"
                ;;
              dev|*)
                IMAGE="$DEV_IMAGE"
                ;;
            esac

            echo "image=${IMAGE}" >> $GITHUB_OUTPUT
            echo "Using fallback image: ${IMAGE}"
          fi

  lint:
    name: Lint & Validate Code
    needs: [set-image]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.set-image.outputs.image }}
    steps:
      - name: Checkout code
        # No need for submodules since we are not running code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install PNPM dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run eslint

      - name: Validate format
        run: pnpm run format:check

      - name: Validate .editorconfig adherence
        run: pnpm run editorconfig:check

      - name: Validate scriptsInfo in package.json
        run: pnpm run validate-scripts

  cmake-build:
    name: Build C/C++
    uses: ./.github/workflows/cmake-build.yml
    needs: [set-image]
    with:
      image: ${{ needs.set-image.outputs.image }}

  # Docs now builds react app internally
  build-docs:
    name: Build Documentation Site
    uses: ./.github/workflows/build-docs.yml
    needs: [set-image, cmake-build]
    with:
      image: ${{ needs.set-image.outputs.image }}
      wasm-artifacts-path: packages/js/build-wasm/
    secrets:
      ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
      ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
      ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
