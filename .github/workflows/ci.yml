name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
        description: "The name of the GitHub artifact containing the docker image tarball."

permissions:
  contents: read

jobs:
  # wait-for-image:
  #   name: Wait for Docker image to be pushed to Docker Hub
  #   uses: ./.github/workflows/wait-for-docker-image.yml
  #   with:
  #     artifact-name: {{ inputs.artifact-name }}

  lint:
    name: Lint & Validate Code
    # needs: wait-for-image
    runs-on: ubuntu-latest
    with:
      artifact-name: ${{ inputs.artifact-name }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: /tmp

      - name: Load Docker Image
        run: |
          docker load --input /tmp/image.tar
          # Verify the image is loaded (it will be tagged as local-image:latest per the build-docker script)
          docker image ls

      - name: Checkout code
        # No need for submodules since we are not running code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install PNPM dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run eslint

      - name: Validate format
        run: pnpm run format:check

      - name: Validate .editorconfig adherance
        run: pnpm run editorconfig:check

      - name: Validate scriptsInfo in package.json
        run: pnpm run validate-scripts

  cmake-build:
    name: Build C/C++
    uses: ./.github/workflows/cmake-build.yml
    # needs: wait-for-image
    with:
      artifact-name: ${{ inputs.artifact-name }}

  build-react-app:
    name: Build React App
    uses: ./.github/workflows/build-react-app.yml
    needs: [cmake-build] # , wait-for-image]
    with:
      artifact-name: ${{ inputs.artifact-name }}
      wasm-artifacts-path: packages/js/build-wasm/

  build-docs:
    name: Build Documentation Site
    uses: ./.github/workflows/build-docs.yml
    # needs: wait-for-image
    with:
      with:
      artifact-name: ${{ inputs.artifact-name }}
    secrets:
      ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
      ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
      ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
