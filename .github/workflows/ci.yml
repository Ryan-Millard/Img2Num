name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  set-image:
    name: Set Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set.outputs.image }}
    steps:
      - name: Set image
        id: set
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "image=ghcr.io/ryanmillard/img2num-dev:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "image=ghcr.io/ryanmillard/img2num-dev:main" >> $GITHUB_OUTPUT
          fi
  wait-for-image:
    needs: set-image
    name: Wait for Docker image to be pushed to GHCR
    uses: ./.github/workflows/wait-for-docker-image.yml
    with:
      image: ${{ needs.set-image.outputs.image }}

  lint:
    name: Lint & Validate Code
    needs: [set-image, wait-for-image]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.set-image.outputs.image }}
    steps:
      - name: Checkout code
        # No need for submodules since we are not running code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install PNPM dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run eslint

      - name: Validate format
        run: pnpm run format:check

      - name: Validate .editorconfig adherance
        run: pnpm run editorconfig:check

      - name: Validate scriptsInfo in package.json
        run: pnpm run validate-scripts

  cmake-build:
    name: Build C/C++
    uses: ./.github/workflows/cmake-build.yml
    needs: [set-image, wait-for-image]
    with:
      image: ${{ needs.set-image.outputs.image }}

  build-react-app:
    name: Build React App
    uses: ./.github/workflows/build-react-app.yml
    needs: [set-image, cmake-build, wait-for-image]
    with:
      image: ${{ needs.set-image.outputs.image }}
      wasm-artifacts-path: packages/js/build-wasm/

  build-docs:
    name: Build Documentation Site
    uses: ./.github/workflows/build-docs.yml
    needs: [set-image, wait-for-image]
    with:
      image: ${{ needs.set-image.outputs.image }}
    secrets:
      ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
      ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
      ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
