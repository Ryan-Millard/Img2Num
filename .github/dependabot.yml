version: 2
updates:
  # ======================================================================
  # Root workspace (tooling, linting, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      all-deps:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
      - "root"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"

  # Core JS package
  - package-ecosystem: "npm"
    directory: "/packages/js"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      all-deps:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
      - "package:js"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(packages/js)"

  # React example app
  - package-ecosystem: "npm"
    directory: "/example-apps/react-js"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      all-deps:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
      - "example-app"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(example-apps/react-js)"

  # Docs (Docusaurus)
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      all-deps:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
      - "docs"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docs)"

  # ======================================================================
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      all-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
