name: New Request
description: Suggest or request a new feature
labels: ["enhancement"]
body:

  - type: markdown
    attributes:
      value: |
        Please fill out the sections below to properly describe the new feature you are suggesting.

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: |
        Example: a new preprocessing function - Gaussian blur.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: It should be implemented because
      placeholder: |
        Example: it is faster at smoothing images than bilateral filters.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: |
        Add any other context or screenshots about the feature request here.

  - type: dropdown
    id: assign
    attributes:
      label: "Would you like to work on this issue?"
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Let's see together if it can be implemented.
