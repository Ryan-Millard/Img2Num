<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 350"><style>.text{fill:#fff;font-family:sans-serif}.node-tex{fill:#2d2d2d;stroke:#4caf50;stroke-width:2}.node-tmp{fill:#2d2d2d;stroke:#e91e63;stroke-dasharray:4,4}.arrow,.node-shader,.node-tmp{stroke-width:2}.node-shader{fill:#1a237e;stroke:#4fc3f7}.arrow{stroke:#fff;marker-end:url(#arrow);fill:none}</style><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="m0 0 10 5-10 5z" fill="#fff"/></marker></defs><rect width="100%" height="100%" style="fill:#1e1e1e"/><text x="20" y="30" style="fill:#fff;font-family:sans-serif;font-size:18px;font-weight:700">Bilateral Filter Pipeline (with CIELAB Conversion)</text><rect x="20" y="100" width="100" height="50" rx="5" class="node-tex"/><text x="30" y="120" class="text" font-size="12">Input Image</text><text x="30" y="140" class="text" font-size="10">rgba8unorm / f32</text><rect x="150" y="85" width="120" height="80" rx="10" class="node-shader"/><text x="165" y="115" class="text" font-size="12">Pass 1:</text><text x="165" y="135" class="text" font-size="12">RGB -&gt; LAB</text><text x="165" y="150" class="text" font-size="10">rgb2cielab.wgsl</text><rect x="300" y="100" width="100" height="50" rx="5" class="node-tmp"/><text x="310" y="120" class="text" font-size="12">Temp LAB</text><text x="310" y="140" class="text" font-size="10">rgba32float</text><rect x="430" y="85" width="120" height="80" rx="10" class="node-shader"/><text x="445" y="115" class="text" font-size="12">Pass 2:</text><text x="445" y="135" class="text" font-size="12">Bilateral LAB</text><text x="445" y="150" class="text" font-size="10">bilateral_lab.wgsl</text><rect x="430" y="220" width="120" height="50" rx="5" style="fill:#2d2d2d;stroke:#ff9800;stroke-width:2"/><text x="440" y="240" class="text" font-size="12">Params (Uniform)</text><text x="440" y="260" class="text" font-size="10">sigmaS, sigmaR</text><rect x="580" y="100" width="110" height="50" rx="5" class="node-tmp"/><text x="590" y="120" class="text" font-size="12">Filtered LAB</text><text x="590" y="140" class="text" font-size="10">rgba32float</text><rect x="720" y="85" width="120" height="80" rx="10" class="node-shader"/><text x="735" y="115" class="text" font-size="12">Pass 3:</text><text x="735" y="135" class="text" font-size="12">LAB -&gt; RGB</text><text x="735" y="150" class="text" font-size="10">cielab2rgb.wgsl</text><rect x="870" y="100" width="70" height="50" rx="5" class="node-tex"/><text x="880" y="120" class="text" font-size="12">Output</text><text x="880" y="140" class="text" font-size="10">rgba8unorm</text><path d="M120 125h20" class="arrow"/><path d="M270 125h20" class="arrow"/><path d="M400 125h20" class="arrow"/><path d="M490 220v-45" class="arrow"/><path d="M550 125h20" class="arrow"/><path d="M690 125h20" class="arrow"/><path d="M840 125h20" class="arrow"/></svg>