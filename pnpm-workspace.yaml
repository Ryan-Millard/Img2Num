packages:
  - packages/js
  - example-apps/react-js
  - example-apps/console-js
  - docs
  - scripts/img2num-dev-scripts

allowBuilds:
  "@swc/core": true
  core-js: true
  sharp: true
  webgpu: true

minimumReleaseAgeExclude:
  - lucide-react@1.22.0
  - '@vitest/coverage-v8@4.1.10'
  - '@vitest/expect@4.1.10'
  - '@vitest/mocker@4.1.10'
  - '@vitest/pretty-format@4.1.10'
  - '@vitest/runner@4.1.10'
  - '@vitest/snapshot@4.1.10'
  - '@vitest/spy@4.1.10'
  - '@vitest/utils@4.1.10'
  - typedoc@0.28.20
  - vitest@4.1.10

onlyBuiltDependencies:
  - "@swc/core"
  - core-js
  - core-js-pure
  - esbuild
  - sharp
  - webgpu
