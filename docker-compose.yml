services:
  dev:
    image: ${IMG2NUM_IMAGE:-ryanmillard/img2num-dev:latest} # Allow specifying the image
    environment:
      IMG2NUM_IMAGE: ${IMG2NUM_IMAGE:-ryanmillard/img2num-dev:latest}
    pull_policy: always
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app:cached
      - /usr/src/app/.venv      # PROTECTS the container's .venv from being overwritten
      - pnpm-store:/pnpm
    ports:
      - "5173:5173" # example-apps/react-js dev
      - "4173:4173" # example-apps/react-js preview
      - "3000:3000" # docs/ start
      - "5174:5174" # example-apps/html-js start and dev
      - "4174:4174" # example-apps/html-js preview
    stdin_open: true
    tty: true

volumes:
  pnpm-store:
