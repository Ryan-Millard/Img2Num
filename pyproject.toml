[project]
name = "img2num_uv_workspace"
version = "0.0.0"
description = "Root level workspace for Img2Num's Python package and applications"
requires-python = ">=3.10"
dependencies = [
  "img2num"
]

[tool.uv]
package = false
no-build-isolation-package = ["img2num"]

[tool.uv.sources]
img2num = { workspace = true }

[tool.uv.workspace]
members = [
  # Python wrapper package
  "packages/py",
  # All example apps with "-py" suffix
  "example-apps/*-py"
]

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "B",   # flake8-bugbear (mutable defaults, bare excepts, etc.)
  "UP",  # pyupgrade — modernise syntax
  "SIM", # flake8-simplify
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"] # Allow re-exports in __init__.py

[project.optional-dependencies]
dev = [
  "ruff>=0.4.0",
]